<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Soins</title>

<style>
  body {
    margin:0;
    font-family: Arial;
    background:#f4f4f4;
  }

  /* LOGIN */
  .login {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .card {
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
  }

  input {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
  }

  button {
    padding:10px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
  }

  .btn {
    background:black;
    color:white;
  }

  .box {
    background:white;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
    box-shadow:0 5px 10px rgba(0,0,0,0.05);
  }

  .admin {
    background:black;
    color:white;
    height:100vh;
    padding:20px;
  }

  .user {
    padding:20px;
  }

</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="card">
    <h2>Connexion</h2>

    <input id="login" placeholder="Login">
    <input id="password" type="password" placeholder="Mot de passe">

    <button class="btn" onclick="login()">Se connecter</button>
  </div>
</div>

<script>

function login() {
  let l = document.getElementById("login").value;
  let p = document.getElementById("password").value;

  if (l === "admin" && p === "admin") {
    showAdmin();
  }
  else if (l === "user" && p === "admin") {
    showUser();
  }
  else {
    alert("Identifiants incorrects");
  }
}

/* ---------------- ADMIN ---------------- */

function showAdmin() {
  document.body.innerHTML = `
  <div class="admin">

    <h1>Mode Admin</h1>

    <h2>Soins disponibles</h2>

    <div class="box">
      <b>💆 Massage</b><br>
      Soin : 60 min<br>
      Installation : 10 min<br>
      Rangement : 10 min<br>
      <b>Total : 80 min</b>
    </div>

    <div class="box">
      <b>💅 Manucure</b><br>
      Soin : 30 min<br>
      Installation : 5 min<br>
      Rangement : 5 min<br>
      <b>Total : 40 min</b>
    </div>

    <h3>Gestion (future étape)</h3>
    <button onclick="alert('Ajout soins bientôt')">+ Ajouter soin</button>

    <br><br>
    <button onclick="location.reload()">Déconnexion</button>

  </div>
  `;
}

/* ---------------- USER ---------------- */

function showUser() {
  document.body.innerHTML = `
  <div class="user">

    <h1>Prise de rendez-vous</h1>

    <h3>Choisis un soin</h3>

    <div class="box">
      <b>💆 Massage</b><br>
      Durée totale : 80 min<br>
      <button onclick="alert('Massage sélectionné')">Choisir</button>
    </div>

    <div class="box">
      <b>💅 Manucure</b><br>
      Durée totale : 40 min<br>
      <button onclick="alert('Manucure sélectionné')">Choisir</button>
    </div>

    <br>
    <button onclick="location.reload()">Déconnexion</button>

  </div>
  `;
}

</script>

</body>
</html>
