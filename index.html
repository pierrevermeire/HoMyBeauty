<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Rendez-vous</title>

<style>
  body {
    margin:0;
    font-family: Arial;
    background:#f4f4f4;
  }

  .login {
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .card {
    background:white;
    padding:30px;
    border-radius:12px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
  }

  input {
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ddd;
  }

  button {
    padding:10px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
  }

  .btn {
    background:black;
    color:white;
  }

  .box {
    background:white;
    padding:15px;
    border-radius:10px;
    margin:10px 0;
    box-shadow:0 5px 10px rgba(0,0,0,0.05);
  }

  .user {
    padding:20px;
  }

  .admin {
    background:black;
    color:white;
    height:100vh;
    padding:20px;
  }
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login">
  <div class="card">
    <h2>Connexion</h2>

    <input id="login" placeholder="Login">
    <input id="password" type="password" placeholder="Mot de passe">

    <button class="btn" onclick="login()">Se connecter</button>
  </div>
</div>

<script>

/* =========================
   VARIABLES GLOBALES
========================= */

let selectedSlot = null;
let selectedSoin = null;
let bookedSlots = [];

/* =========================
   LOGIN
========================= */

function login() {
  let l = document.getElementById("login").value;
  let p = document.getElementById("password").value;

  if (l === "admin" && p === "admin") {
    showAdmin();
  }
  else if (l === "user" && p === "admin") {
    showUser();
  }
  else {
    alert("Identifiants incorrects");
  }
}

/* =========================
   ADMIN
========================= */

function showAdmin() {
  document.body.innerHTML = `
  <div class="admin">

    <h1>Mode Admin</h1>

    <h2>Soins disponibles</h2>

    <div class="box">
      💆 <b>Massage</b><br>
      Soin : 60 min<br>
      Installation : 10 min<br>
      Rangement : 10 min<br>
      <b>Total : 80 min</b>
    </div>

    <div class="box">
      💅 <b>Manucure</b><br>
      Soin : 30 min<br>
      Installation : 5 min<br>
      Rangement : 5 min<br>
      <b>Total : 40 min</b>
    </div>

    <button onclick="location.reload()">Déconnexion</button>

  </div>
  `;
}

/* =========================
   USER - AGENDA
========================= */

function showUser() {

  let slots = [
    "09:00","10:00","11:00","12:00",
    "13:00","14:00","15:00","16:00","17:00"
  ];

  let html = "";

  slots.forEach(slot => {

    let disabled = bookedSlots.includes(slot);

    html += `
      <div class="box">
        <b>${slot}</b><br>
        <button ${disabled ? "disabled" : ""} onclick="selectSlot('${slot}')">
          ${disabled ? "Réservé" : "Choisir"}
        </button>
      </div>
    `;
  });

  document.body.innerHTML = `
  <div class="user">

    <h1>Agenda</h1>

    <h3>Étape 1 : Choisir un créneau</h3>

    ${html}

    <br>
    <button onclick="location.reload()">Déconnexion</button>

  </div>
  `;
}

/* =========================
   ÉTAPE 2 - CHOIX CRÉNEAU
========================= */

function selectSlot(slot) {
  selectedSlot = slot;

  document.body.innerHTML = `
  <div class="user">

    <h1>Choisir un soin</h1>

    <p>Créneau : <b>${slot}</b></p>

    <div class="box">
      💆 Massage<br>
      80 min total<br>
      <button onclick="confirmSoin('massage')">Choisir</button>
    </div>

    <div class="box">
      💅 Manucure<br>
      40 min total<br>
      <button onclick="confirmSoin('manucure')">Choisir</button>
    </div>

    <br>
    <button onclick="showUser()">Retour</button>

  </div>
  `;
}

/* =========================
   DURÉES SOINS
========================= */

function getDuration(soin) {
  if (soin === "massage") {
    return { soin:60, installation:10, rangement:10, total:80 };
  }

  if (soin === "manucure") {
    return { soin:30, installation:5, rangement:5, total:40 };
  }
}

/* =========================
   CONFIRMATION RDV
========================= */

function confirmSoin(soin) {

  let d = getDuration(soin);

  bookedSlots.push(selectedSlot);

  alert(
    "RDV confirmé\n" +
    "Créneau : " + selectedSlot + "\n" +
    "Soin : " + soin + "\n" +
    "Durée totale : " + d.total + " min"
  );

  showUser();
}

</script>

</body>
</html>
