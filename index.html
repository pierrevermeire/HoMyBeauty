<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f4f8;
    }

    /* LOGIN CARD */
    .login-container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: white;
      padding: 35px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
      width: 300px;
    }

    .card h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn-login {
      background: #000;
      color: white;
    }

    .btn-login:hover {
      background: #333;
    }

    /* SCREENS */
    .screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }

    .admin {
      background: #000;
      color: white;
    }

    .user {
      background: #ffeb3b;
      color: black;
    }

    .title {
      font-size: 40px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .btn-logout {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 20px;
    }

    .admin .btn-logout {
      background: white;
      color: black;
    }

    .user .btn-logout {
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-container">
  <div class="card">
    <h2>Connexion</h2>

    <input id="login" placeholder="Login">
    <input id="password" type="password" placeholder="Mot de passe">

    <button class="btn-login" onclick="login()">Se connecter</button>
  </div>
</div>

<script>
function login() {
  let login = document.getElementById("login").value;
  let password = document.getElementById("password").value;

  if (login === "admin" && password === "admin") {
    showAdmin();
  } 
  else if (login === "user" && password === "admin") {
    showUser();
  } 
  else {
    alert("Identifiants incorrects");
  }
}

/* ADMIN SCREEN */
function showAdmin() {
  document.body.innerHTML = `
    <div class="screen admin">
      <div class="title">MODE ADMIN</div>
      <button class="btn-logout" onclick="location.reload()">Déconnexion</button>
    </div>
  `;
}

/* USER SCREEN */
function showUser() {
  document.body.innerHTML = `
    <div class="screen user">
      <div class="title">UTILISATEUR</div>
      <button class="btn-logout" onclick="location.reload()">Déconnexion</button>
    </div>
  `;
}
</script>

</body>
</html>
