<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mon App</title>
</head>

<body style="margin:0; font-family:Arial; background:#f4f4f4;">

<!-- LOGIN -->
<div id="loginPage" style="display:flex; height:100vh; justify-content:center; align-items:center;">
  
  <div style="background:white; padding:30px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.1); text-align:center;">
    
    <h2>Connexion</h2>

    <input id="login" placeholder="Login" style="padding:10px; width:200px;"><br><br>
    <input id="password" type="password" placeholder="Mot de passe" style="padding:10px; width:200px;"><br><br>

    <button onclick="login()" style="padding:10px 20px; background:black; color:white; border:none; cursor:pointer;">
      Se connecter
    </button>

  </div>
</div>

<script>
function login() {
  let login = document.getElementById("login").value;
  let password = document.getElementById("password").value;

  if (login === "admin" && password === "admin") {
    showAdmin();
  } 
  else if (login === "user" && password === "admin") {
    showUser();
  } 
  else {
    alert("Identifiants incorrects");
  }
}

function showAdmin() {
  document.body.innerHTML = `
    <div style="background:black; color:white; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
      <h1>MODE ADMIN</h1>
      <button onclick="location.reload()" style="padding:10px 20px;">Déconnexion</button>
    </div>
  `;
}

function showUser() {
  document.body.innerHTML = `
    <div style="background:#ffeb3b; color:black; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;">
      <h1>UTILISATEUR</h1>
      <button onclick="location.reload()" style="padding:10px 20px;">Déconnexion</button>
    </div>
  `;
}
</script>

</body>
</html>
